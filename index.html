<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

button {
  padding: 15px 30px;
  border: none;
  background: red;
  color: white;
  font-size: 18px;
  border-radius: 30px;
  cursor: pointer;
}

.hidden {
  display: none;
}

.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 2.5em;
}

.typing {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
}

img {
  width: 220px;
  border-radius: 20px;
  margin-top: 20px;
}

.heart {
  position: fixed;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- OPENING -->
<div class="container" id="opening">
  <h1>🎁 Ada sesuatu untuk kamu...</h1>
  <button onclick="start()">Buka ❤️</button>
</div>

<!-- CONTENT -->
<div id="content" class="hidden">

  <div class="section">
    <h1 class="typing" id="text1"></h1>
  </div>

  <div class="section">
    <h1>Hai Sayang 🥺</h1>
    <p>Hari ini bukan hari biasa... tapi hari dimana dunia diberi hadiah terindah — yaitu kamu.</p>
  </div>

  <div class="section">
    <h1>Aku Bersyukur</h1>
    <p>Terima kasih sudah hadir dalam hidupku ❤️</p>
  </div>

  <div class="section">
    <h1>Kenangan Kita</h1>
    <img src="foto-kalian.jpg">
  </div>

  <div class="section">
    <h1>I Love You ❤️</h1>
    <p>Selamat ulang tahun ya cintaku...</p>
  </div>

</div>

<script>
function start() {
  document.getElementById("opening").style.display = "none";
  document.getElementById("content").classList.remove("hidden");
  document.body.style.overflow = "auto";
  document.getElementById("music").play();

  typeText("Selamat Ulang Tahun ❤️");
}

// typing effect
function typeText(text) {
  let i = 0;
  let speed = 80;
  function typing() {
    if (i < text.length) {
      document.getElementById("text1").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// love animation
setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 20 + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
